<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HydroHero Signup</title>

<link rel="stylesheet" href="css/signup.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="signup-container">

<div class="signup-card">

<div class="signup-brand">
<h1 class="signup-logo">💧 HydroHero</h1>
<p class="signup-tagline">Become a Water Saving Hero</p>
</div>

<form class="signup-form" id="signupForm">

<input type="text" id="name" class="signup-input" placeholder="Enter your full name" required>

<input type="email" id="email" class="signup-input" placeholder="Enter your email" required>

<input type="password" id="password" class="signup-input" placeholder="Create a password" required>

<input type="password" id="confirmPassword" class="signup-input" placeholder="Confirm password" required>

<input type="text" id="town" class="signup-input" placeholder="Enter your village or town" required>

<button type="submit" class="signup-button">
Create Account
</button>

</form>


<p class="signup-redirect">
Already a HydroHero?
<a href="index.html">Login</a>
</p>

</div>

</div>
<script>
document.getElementById("signupForm").addEventListener("submit", function(e){

e.preventDefault();

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;
let town = document.getElementById("town").value;

let user = {
name,
email,
password,
town
};

let users = JSON.parse(localStorage.getItem("users")) || [];

users.push(user);

localStorage.setItem("users", JSON.stringify(users));

alert("Account created successfully!");

window.location.href = "index.html";

});
</script>
</body>
</html>
